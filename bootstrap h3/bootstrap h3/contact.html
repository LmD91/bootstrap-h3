<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Contact Yamaha</title>

<link rel="icon" type="image/png" href="img/yamaha-logo-noir-et-blanc.jpg">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="css/style.css">

</head>

<body>

<header class="site-header p-3 border-bottom" style="background-color:#000fdb;">
  <div class="container d-flex flex-wrap align-items-center justify-content-between">
    <!-- Logo -->
    <a href="index.html" class="d-flex align-items-center mb-2 mb-lg-0 text-decoration-none text-white">
      <strong>Yamaha</strong>
    </a>

    
    <form class="col-12 col-lg-auto mb-3 mb-lg-0 me-lg-3 d-flex gap-2" role="search">
      <input type="search" class="form-control" name="q" placeholder="Rechercher un modèle..." aria-label="Rechercher">
      <button class="btn btn-warning" type="submit">OK</button>
    </form>

   
    <div class="dropdown text-end">
      <a href="#" class="d-block link-body-emphasis text-decoration-none dropdown-toggle" data-bs-toggle="dropdown" aria-expanded="false">
        <img src="https://github.com/mdo.png" alt="Profil" width="32" height="32" class="rounded-circle">
      </a>
      <ul class="dropdown-menu text-small">
        <li><a class="dropdown-item" href="index.html">Accueil</a></li>
        <li><a class="dropdown-item" href="histoire.html">Histoire</a></li>
        <li><a class="dropdown-item" href="modeles.html">Modèles</a></li>
        <li><a class="dropdown-item" href="contact.html">Inscription</a></li>
      </ul>
    </div>
  </div>
</header>

<section class="contact-section">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-7">
        <div class="text-center mb-4">
          <h1 class="mb-3">Contact</h1>
          <p class="lead mb-1">Une question sur un modèle Yamaha, un projet ou un événement ?</p>
          <p class="mb-0">Remplis le formulaire ci-dessous, nous te répondrons dès que possible.</p>
        </div>

        <div class="contact-card p-4 p-md-5">
          <form>
            <div class="mb-3">
              <label for="contactNom" class="form-label">Nom</label>
              <input type="text" class="form-control" id="contactNom" placeholder="Ton nom" required>
            </div>

            <div class="mb-3">
              <label for="contactEmail" class="form-label">Email</label>
              <input type="email" class="form-control" id="contactEmail" placeholder="nom@exemple.com" required>
            </div>

            <div class="mb-3">
              <label for="contactSujet" class="form-label">Sujet</label>
              <select class="form-select" id="contactSujet" required>
                <option value="" selected disabled>Choisir un sujet</option>
                <option value="modele">Question sur un modèle</option>
                <option value="essai">Demande d’essai / information</option>
                <option value="evenement">Événement / communauté</option>
                <option value="autre">Autre demande</option>
              </select>
            </div>

            <div class="mb-3">
              <label for="contactMessage" class="form-label">Message</label>
              <textarea class="form-control" id="contactMessage" rows="4" placeholder="Ton message..." required></textarea>
            </div>

            <button type="submit" class="btn btn-danger w-100">Envoyer</button>
          </form>
        </div>

        <div class="text-center contact-extra mt-4">
          <p class="mb-1">Mail : <a href="mailto:contact@yamaha-fan.fr">contact@yamaha-fan.fr</a></p>
          <p class="mb-0">Instagram : <a href="https://www.instagram.com/yamaharacingcomofficial/" target="_blank">@yamaharacing</a></p>
        </div>
      </div>
    </div>
  </div>
</section>

<footer>
Site fan sur Yamaha By LmD
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/site-header-scroll.js"></script>
<script src="js/site-search.js"></script>
</body>
</html>
